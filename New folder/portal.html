<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal | Travelscape Maldives</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { background: #080d1a; color: #fff; padding-top: 100px; font-family: 'Inter', sans-serif; }
    .portal-container { max-width: 1000px; margin: 0 auto; padding: 20px; }
    .login-box { max-width: 400px; margin: 100px auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 12px; }
    input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: #111; color: white; }
    button { background: #0ea5e9; font-weight: bold; cursor: pointer; border: none; }
    button:hover { background: #0284c7; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: rgba(255,255,255,0.1); cursor: pointer; border-radius: 8px; }
    .tab.active { background: #0ea5e9; }
    .hidden { display: none; }
  </style>
</head>
<body>

  <div class="portal-container">
    
    <!-- Login Screen -->
    <div id="login-section" class="login-box">
      <h2>Portal Login</h2>
      <select id="login-role">
        <option value="STAFF">Staff</option>
        <option value="ADMIN">Admin</option>
      </select>
      <input type="password" id="login-password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p id="login-error" style="color: red; display: none;">Invalid credentials</p>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-section" class="hidden">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h2>Dashboard (<span id="user-role-display"></span>)</h2>
        <button onclick="logout()" style="width: auto; background: #ef4444;">Logout</button>
      </div>

      <div class="tabs">
        <div class="tab active" onclick="switchTab('bookings')">Bookings</div>
        <div class="tab" onclick="switchTab('contacts')">Contact Messages</div>
        <div class="tab" onclick="switchTab('excursions')">Manage Excursions</div>
      </div>

      <!-- Bookings Tab -->
      <div id="tab-bookings">
        <h3>Recent Bookings</h3>
        <table>
          <thead>
            <tr>
              <th>ID</th><th>Name</th><th>Email</th><th>Category</th><th>Date</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="bookings-table-body"></tbody>
        </table>
      </div>

      <!-- Contacts Tab -->
      <div id="tab-contacts" class="hidden">
        <h3>Contact Messages</h3>
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Email</th><th>Message</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="contacts-table-body"></tbody>
        </table>
      </div>
      
      <!-- Excursions Tab -->
      <div id="tab-excursions" class="hidden">
        <h3>Manage Excursions</h3>
        <form id="excursion-form" style="margin-bottom: 30px;">
          <input type="text" id="excursion-title" placeholder="Title" required>
          <input type="text" id="excursion-description" placeholder="Description" required>
          <input type="number" id="excursion-price" placeholder="Price ($)" required>
          <label>Main Image:</label>
          <input type="file" id="excursion-media" accept="image/*" required>
          <label>Cover Image (Layer 2 Background):</label>
          <input type="file" id="excursion-cover" accept="image/*">
          <label>Video (Layer 2 Background):</label>
          <input type="file" id="excursion-video" accept="video/*">
          <button type="submit">Add Excursion</button>
        </form>
        
        <table id="excursions-table">
          <thead>
            <tr>
              <th>Title</th><th>Price</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="excursions-table-body"></tbody>
        </table>
      </div>

    </div>
  </div>

  <script src="portal.js"></script>
</body>
</html>
